<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>PayShield AI - Sign Up</title>

    <link rel="stylesheet" href="signup.css">

</head>

<body>

    <div class="signup-box">

        <h1>
            PayShield <span>AI</span>
        </h1>

        <p class="tagline">
            Create Your Secure AI Account
        </p>

        <input type="text"
               id="signupName"
               placeholder="Full Name">

        <input type="email"
               id="signupEmail"
               placeholder="Enter Email">

        <input type="password"
               id="signupPassword"
               placeholder="Create Password">

        <button onclick="signup()">
            Create Account
        </button>

        <p class="login-text">

            Already have an account?

            <a href="login.html">
                Login
            </a>

        </p>

    </div>

    <script src="app.js"></script>

</body>
</html>
