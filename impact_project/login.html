<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>PayShield AI - Login</title>

    <link rel="stylesheet" href="login.css">

</head>

<body>

    <div class="login-box">

        <h1>
            PayShield <span>AI</span>
        </h1>

        <p class="tagline">
            AI-Powered Fraud Detection System
        </p>

        <input type="email"
               id="loginEmail"
               placeholder="Enter Email">

        <input type="password"
               id="loginPassword"
               placeholder="Enter Password">

        <button onclick="login()">
            Login
        </button>

        <p class="signup-text">

            Don't have an account?

            <a href="signup.html">
                Sign Up
            </a>

        </p>

    </div>

    <script src="app.js"></script>

</body>
</html>
